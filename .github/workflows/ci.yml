name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and test inside dev container
        uses: devcontainers/ci@v0.3
        with:
          runCmd: npm ci && npm run test:all
