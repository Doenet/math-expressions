name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["*"]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    rust-build:
        name: Rust build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Build the Rust crate
              uses: devcontainers/ci@v0.3
              with:
                  runCmd: cargo build --release

    rust-test:
        name: Rust test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Run the Rust test suite
              uses: devcontainers/ci@v0.3
              with:
                  runCmd: cargo test

    playground-build:
        name: Playground build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            # `npm run build` runs the wireit graph, which first compiles the
            # Rust crate to wasm (build:wasm -> rebuild-wasm.sh) and then runs
            # the typecheck and `vite build`. The pinned wasm-bindgen-cli and
            # wasm32 target come from the devcontainer.
            - name: Build the playground
              uses: devcontainers/ci@v0.3
              with:
                  runCmd: cd packages/playground && npm ci && npm run build

    # NOTE: a `js-compat` job (the TypeScript drop-in replacement, exercised by
    # the spec/ suite converted to TS) will be added here once that package lands.
